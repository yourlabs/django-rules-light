[tox]
# Django 6.0 requires Python 3.12+; Python 3.10/3.11 stop at Django 5.2
envlist =
    py{310,311}-django{42,51,52}
    py{312,313}-django{42,51,52,60}
    py314-django{52,60}

[testenv]
usedevelop = true
commands = pytest rules_light/tests/
deps =
    mock
    pytest
    pytest-django
    django42: Django>=4.2,<5.0
    django51: Django>=5.1,<5.2
    django52: Django>=5.2,<6.0
    django60: Django>=6.0,<7.0
setenv =
    DJANGO_SETTINGS_MODULE=test_project.settings
    PYTHONPATH=test_project

[testenv:checkqa]
basepython = python3.13
commands = ruff check rules_light
deps = ruff

[pytest]
markers =
    django_db
